                <button key={c} onClick={() => setCatFilter(c)} style={{ padding: '7px 14px', borderRadius: '20px', border: '1px solid var(--border2)', background: catFilter === c ? 'var(--primary)' : 'var(--card2)', color: catFilter === c ? '#000' : 'var(--muted)', fontSize: 12, fontWeight: 600, cursor: 'pointer' }}>
                  {c}
                </button>
              ))}
            </div>
          </div>
          <div className="stat-grid-5" style={{ display: 'grid', gridTemplateColumns: 'repeat(5,1fr)', gap: 12, marginBottom: 20 }}>
            {[
              { l: 'Total Produk', v: products.length, c: 'var(--info)' },
              { l: 'Stok Menipis', v: products.filter(p => p.stock <= p.minStock).length, c: 'var(--warn)' },
              { l: 'Stok Habis', v: products.filter(p => p.stock === 0).length, c: 'var(--danger)' },
              { l: 'Kadaluarsa', v: products.filter(p => p.expiryDate && p.expiryDate < today()).length, c: 'var(--danger)' },
              { l: 'Total Nilai Stok', v: fmt(products.reduce((s, p) => s + p.cost * p.stock, 0)), c: 'var(--success)' },
            ].map((s, i) => (
              <div key={i} className="card" style={{ padding: '14px' }}>
                <div style={{ fontSize: 11, color: 'var(--muted)', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '.5px' }}>{s.l}</div>
                <div className="mono" style={{ fontSize: 20, fontWeight: 700, color: s.c, marginTop: '4px' }}>{s.v}</div>
              </div>
            ))}
          </div>
          <div className="card" style={{ padding: 0, overflow: 'hidden' }}>
            <div style={{ overflowX: 'auto' }}>
              <table style={{ width: '100%', borderCollapse: 'collapse' }}>
                <thead>
                  <tr style={{ background: 'var(--card2)', borderBottom: '1px solid var(--border)' }}>
                    {['Produk', 'Barcode', 'Kategori', 'Harga Jual', 'HPP', 'Stok', 'Kadaluarsa', 'Status', 'Aksi'].map(h => (
                      <th key={h} style={{ padding: '12px 16px', textAlign: 'left', fontSize: 11, fontWeight: 700, color: 'var(--muted)', letterSpacing: '.5px', textTransform: 'uppercase', whiteSpace: 'nowrap' }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {filtered.map((p, i) => (
                    <tr key={p.id} style={{ borderBottom: '1px solid var(--border)', background: i % 2 ? 'var(--card2)' : 'transparent' }}>
                      <td style={{ padding: '12px 16px' }}>
                        <div style={{ fontWeight: 600, fontSize: 13 }}>{p.name}</div>
                      </td>
                      <td style={{ padding: '12px 16px' }}><span className="mono tag">{p.barcode || '-'}</span></td>
                      <td style={{ padding: '12px 16px' }}><span className="badge badge-info">{p.category}</span></td>
                      <td style={{ padding: '12px 16px' }}><span className="mono" style={{ fontWeight: 600, color: 'var(--primary)' }}>{fmt(p.price)}</span></td>
                      <td style={{ padding: '12px 16px' }}><span className="mono" style={{ color: 'var(--muted)' }}>{fmt(p.cost)}</span></td>
                      <td style={{ padding: '12px 16px' }}>
                        <span className="mono" style={{ fontWeight: 700, color: p.stock <= 0 ? 'var(--danger)' : p.stock <= p.minStock ? 'var(--warn)' : 'var(--success)' }}>{p.stock}</span>
                        <span style={{ fontSize: 10, color: 'var(--dim)', marginLeft: 4 }}>/ min {p.minStock}</span>
                      </td>
                      <td style={{ padding: '12px 16px', fontSize: 12, color: p.expiryDate && p.expiryDate < today() ? 'var(--danger)' : 'var(--text)' }}>
                        {p.expiryDate ? fmtDate(p.expiryDate) : '-'}
                      </td>
                      <td style={{ padding: '12px 16px' }}>
                        {p.expiryDate && p.expiryDate < today() ? <span className="badge badge-danger">Kadaluarsa</span> :
                          p.stock === 0 ? <span className="badge badge-danger">Habis</span>
                            : p.stock <= p.minStock ? <span className="badge badge-warn">Menipis</span>
                              : <span className="badge badge-success">Tersedia</span>}
                      </td>
                      <td style={{ padding: '12px 16px' }}>
                        <div style={{ display: 'flex', gap: 6 }}>
                          <button className="btn btn-success btn-sm" onClick={() => setShowStockIn(p)} title="Tambah Stok">
                            <Icon name="box" size={12} />
                          </button>
                          <button className="btn btn-ghost btn-sm" onClick={() => { setEditItem(p); setShowForm(true); }}><Icon name="edit" size={12} /></button>
                          <button className="btn btn-danger btn-sm" onClick={() => deleteProduct(p.id)}><Icon name="trash" size={12} /></button>
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
              {filtered.length === 0 && <div style={{ padding: '40px', textAlign: 'center', color: 'var(--dim)' }}>Tidak ada produk ditemukan</div>}
            </div>
          </div>
          {showForm && <ProductForm item={editItem} onClose={() => setShowForm(false)} onSave={(data) => {
            if (editItem) {
              const updated = { ...editItem, ...data };
              setProducts(prev => prev.map(p => p.id === editItem.id ? updated : p));
              syncToGoogleSheets('UPDATE_PRODUCT', updated);
            } else {
              const newProduct = { ...data, id: uid() };
              setProducts(prev => [...prev, newProduct]);
              syncToGoogleSheets('ADD_PRODUCT', newProduct);
            }
            setShowForm(false);
            addToast(editItem ? 'Produk diperbarui' : 'Produk ditambahkan', 'var(--success)', '✅');
          }} />}
          {showStockIn && (
            <StockInModal
              product={showStockIn}
              onClose={() => setShowStockIn(null)}
              onSave={(productId, qty, notes) => {
                const updated = products.map(p =>
                  p.id === productId ? { ...p, stock: p.stock + qty } : p
                );
                setProducts(updated);

                const stockRecord = {
                  id: uid(),
                  productId,
                  productName: showStockIn.name,
                  qty,
                  notes,
                  date: today(),
                  time: new Date().toISOString(),
                  by: user.name,
                  stockBefore: showStockIn.stock,
                  stockAfter: showStockIn.stock + qty
                };
                syncToGoogleSheets('STOCK_IN', stockRecord);

                addToast(`Stok ${showStockIn.name} bertambah ${qty}`, 'var(--success)', '📦');
                setShowStockIn(null);
              }}
            />
          )}
        </div>
      );
    }

    function StockInModal({ product, onClose, onSave }) {
      const [qty, setQty] = useState(1);
      const [notes, setNotes] = useState('');

      return (
        <div className="modal-overlay">
          <div className="modal" style={{ maxWidth: 400 }}>
            <div style={{ padding: '20px' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '16px' }}>
                <h3 style={{ fontWeight: 700 }}>📦 Tambah Stok</h3>
                <button onClick={onClose} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--muted)' }}><Icon name="x" size={18} /></button>
              </div>
              <div style={{ background: 'var(--card2)', padding: '12px', borderRadius: '8px', marginBottom: '16px' }}>
                <div style={{ fontWeight: 600 }}>{product.name}</div>
                <div style={{ fontSize: 12, color: 'var(--muted)' }}>
                  Stok saat ini: <strong>{product.stock}</strong> | Min: {product.minStock}
                </div>
              </div>
              <div style={{ marginBottom: 12 }}>
                <div className="label">Jumlah Tambah</div>
                <input
                  className="input mono"
                  type="number"
                  value={qty}
                  onChange={e => setQty(Math.max(1, parseInt(e.target.value) || 1))}
                  style={{ fontSize: 18, fontWeight: 700 }}
                />
              </div>
              <div style={{ marginBottom: 8 }}>
                <div className="label">Stok Setelah Penambahan</div>
                <div className="mono" style={{ fontSize: 16, fontWeight: 700, color: 'var(--success)', padding: '8px', background: 'var(--card2)', borderRadius: '6px', textAlign: 'center' }}>
                  {product.stock + qty} unit
                </div>
              </div>
              <div style={{ marginBottom: 16 }}>
                <div className="label">Catatan (opsional)</div>
                <input
                  className="input"
                  placeholder="Supplier, nomor faktur, dll..."
                  value={notes}
                  onChange={e => setNotes(e.target.value)}
                />
              </div>
              <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end' }}>
                <button className="btn btn-ghost" onClick={onClose}>Batal</button>
                <button className="btn btn-primary" onClick={() => onSave(product.id, qty, notes)}>
                  <Icon name="check" size={14} /> Tambah {qty} Stok
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function ProductForm({ item, onClose, onSave }) {
      const [form, setForm] = useState({ name: '', barcode: '', price: '', cost: '', stock: '', minStock: '10', category: 'Makanan', expiryDate: '', ...item });
      const [showBarcodeScanner, setShowBarcodeScanner] = useState(false);
      const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
      return (
        <div className="modal-overlay">
          {showBarcodeScanner && (
            <BarcodeScannerModal
              title="Scan Barcode Produk"
              onScan={(code) => { set('barcode', code); setShowBarcodeScanner(false); }}
              onClose={() => setShowBarcodeScanner(false)}
            />
          )}
          <div className="modal">
            <div style={{ padding: '20px' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '20px' }}>
                <h3 style={{ fontWeight: 700 }}>{item ? 'Edit' : 'Tambah'} Produk</h3>
                <button onClick={onClose} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--muted)' }}><Icon name="x" size={18} /></button>
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
                {[
                  { l: 'Nama Produk*', k: 'name', full: true, ph: 'Nama produk' },
                  { l: 'Barcode', k: 'barcode', ph: 'Scan atau ketik barcode', isBarcodeField: true },
                  { l: 'Kategori', k: 'category', type: 'select', opts: CATEGORIES },
                  { l: 'Harga Jual (Rp)*', k: 'price', type: 'number', ph: '0' },
                  { l: 'Harga Pokok/HPP (Rp)*', k: 'cost', type: 'number', ph: '0' },
                  { l: 'Stok Awal*', k: 'stock', type: 'number', ph: '0' },
                  { l: 'Stok Minimum*', k: 'minStock', type: 'number', ph: '10' },
                  { l: 'Tgl Kadaluarsa', k: 'expiryDate', type: 'date' },
                ].map(f => (
                  <div key={f.k} style={{ gridColumn: f.full ? '1/-1' : 'auto' }}>
                    <div className="label">{f.l}</div>
                    {f.type === 'select'
                      ? <select className="input select" value={form[f.k]} onChange={e => set(f.k, e.target.value)}>
                        {f.opts.map(o => <option key={o}>{o}</option>)}
                      </select>
                      : f.isBarcodeField
                        ? <div style={{ display: 'flex', gap: 6 }}>
                          <input className="input" type="text" placeholder={f.ph} value={form[f.k]} onChange={e => set(f.k, e.target.value)} style={{ flex: 1 }} />
                          <button type="button" className="btn btn-ghost" title="Scan barcode via kamera" onClick={() => setShowBarcodeScanner(true)} style={{ padding: '8px 10px', flexShrink: 0 }}>📷</button>
                        </div>
                        : <input className="input" type={f.type || 'text'} placeholder={f.ph} value={form[f.k]} onChange={e => set(f.k, e.target.value)} />
                    }
                  </div>
                ))}
              </div>
              {form.price && form.cost && (
                <div style={{ marginTop: 12, padding: '10px', background: 'rgba(16,185,129,.1)', borderRadius: '8px', border: '1px solid rgba(16,185,129,.2)', fontSize: 12 }}>
                  Margin: <strong style={{ color: 'var(--success)' }}>{fmt(form.price - form.cost)}</strong> ({form.price ? Math.round((form.price - form.cost) / form.price * 100) : 0}%)
                </div>
              )}
              <div style={{ display: 'flex', gap: 8, marginTop: '20px', justifyContent: 'flex-end' }}>
                <button className="btn btn-ghost" onClick={onClose}>Batal</button>
                <button className="btn btn-primary" onClick={() => onSave({ ...form, price: +form.price, cost: +form.cost, stock: +form.stock, minStock: +form.minStock })}>
                  <Icon name="check" size={14} /> Simpan
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════
    // MEMBER MANAGEMENT
    // ═══════════════════════════════════════════════════
    function MemberView() {
      const { members, setMembers, transactions, addToast } = useApp();
      const [search, setSearch] = useState('');
      const [showForm, setShowForm] = useState(false);
      const [editItem, setEditItem] = useState(null);
      const [viewProfile, setViewProfile] = useState(null);

      const filtered = members.filter(m => m.name.toLowerCase().includes(search.toLowerCase()) || m.phone.includes(search));

      return (
        <div style={{ padding: '24px', overflowY: 'auto', height: '100%' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '20px' }}>
            <div><h1 style={{ fontSize: 22, fontWeight: 800 }}>👥 Manajemen Member</h1>
              <p style={{ color: 'var(--muted)', fontSize: 13 }}>{members.length} member terdaftar</p></div>
            <div style={{ display: 'flex', gap: 8 }}>
              <button className="btn btn-ghost" onClick={() => exportToExcel(members, 'Member')}><Icon name="download" size={14} /> Export</button>
              <button className="btn btn-primary" onClick={() => { setEditItem(null); setShowForm(true); }}>
                <Icon name="plus" size={14} /> Tambah Member
              </button>
            </div>
          </div>
          <div style={{ position: 'relative', marginBottom: '16px' }}>
            <div style={{ position: 'absolute', left: 10, top: '50%', transform: 'translateY(-50%)' }}><Icon name="search" size={16} color="var(--muted)" /></div>
            <input className="input" style={{ paddingLeft: 36, maxWidth: 400 }} placeholder="Cari nama atau no. HP..." value={search} onChange={e => setSearch(e.target.value)} />
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill,minmax(300px,1fr))', gap: 12 }}>
            {filtered.map(m => {
              const txs = transactions.filter(t => t.memberId === m.id);
              const totalSpend = txs.reduce((s, t) => s + (t.method !== 'Hutang' ? t.total : 0), 0);
              return (
                <div key={m.id} className="card" style={{ cursor: 'pointer', transition: 'all .2s' }}
                  onMouseOver={e => e.currentTarget.style.borderColor = 'var(--primary)'}
                  onMouseOut={e => e.currentTarget.style.borderColor = 'var(--border)'}
                >
                  <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '12px' }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                      <div style={{ width: 40, height: 40, background: 'linear-gradient(135deg,var(--primary),var(--warn))', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 800, color: '#000', fontSize: 16 }}>
                        {m.name[0]}
                      </div>
                      <div>
                        <div style={{ fontWeight: 700 }}>{m.name}</div>
                        <div style={{ fontSize: 12, color: 'var(--muted)' }}>{m.phone}</div>
                      </div>
                    </div>
                    <div style={{ display: 'flex', gap: 4 }}>
                      <button className="btn btn-ghost btn-sm" onClick={() => { setEditItem(m); setShowForm(true); }}><Icon name="edit" size={12} /></button>
                      <button className="btn btn-ghost btn-sm" onClick={() => setViewProfile(m)}><Icon name="eye" size={12} /></button>
                      <button className="btn btn-danger btn-sm" onClick={() => {
                        if (confirm('Yakin ingin menghapus member ini?')) {
                          setMembers(prev => prev.filter(x => x.id !== m.id));
                          syncToGoogleSheets('DELETE_MEMBER', { id: m.id });
                          addToast('Member dihapus', 'var(--muted)', '🗑️');
                        }
                      }}><Icon name="trash" size={12} /></button>
                    </div>
                  </div>
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 8, marginTop: 8 }}>
                    <div style={{ textAlign: 'center', padding: '8px', background: 'var(--card2)', borderRadius: '6px' }}>
                      <div className="mono" style={{ fontSize: 16, fontWeight: 700, color: 'var(--primary)' }}>{m.points}</div>
                      <div style={{ fontSize: 10, color: 'var(--muted)' }}>Poin</div>
                    </div>
                    <div style={{ textAlign: 'center', padding: '8px', background: 'var(--card2)', borderRadius: '6px' }}>
                      <div className="mono" style={{ fontSize: 13, fontWeight: 700, color: 'var(--success)' }}>{fmt(totalSpend)}</div>
                      <div style={{ fontSize: 10, color: 'var(--muted)' }}>Total Belanja</div>
                    </div>
                    <div style={{ textAlign: 'center', padding: '8px', background: m.debt > 0 ? 'rgba(239,68,68,.1)' : 'var(--card2)', borderRadius: '6px', border: m.debt > 0 ? '1px solid rgba(239,68,68,.3)' : 'none' }}>
                      <div className="mono" style={{ fontSize: 13, fontWeight: 700, color: m.debt > 0 ? 'var(--danger)' : 'var(--muted)' }}>{m.debt > 0 ? fmt(m.debt) : 'Lunas'}</div>
                      <div style={{ fontSize: 10, color: 'var(--muted)' }}>Hutang</div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
          {showForm && <MemberForm item={editItem} onClose={() => setShowForm(false)} onSave={data => {
            if (editItem) {
              const updated = { ...editItem, ...data };
              setMembers(prev => prev.map(m => m.id === editItem.id ? updated : m));
              syncToGoogleSheets('UPDATE_MEMBER', updated);
            } else {
              const newMember = { ...data, id: uid(), points: 0, debt: 0, joinDate: today() };
              setMembers(prev => [...prev, newMember]);
              syncToGoogleSheets('ADD_MEMBER', newMember);
            }
            setShowForm(false);
            addToast(editItem ? 'Member diperbarui' : 'Member ditambahkan', 'var(--success)', '✅');
          }} />}
          {viewProfile && <MemberProfile member={viewProfile} onClose={() => setViewProfile(null)} />}
        </div>
      );
    }

    function MemberForm({ item, onClose, onSave }) {
      const [form, setForm] = useState({ name: '', phone: '', address: '', creditLimit: 500000, ...item });
      return (
        <div className="modal-overlay">
          <div className="modal">
            <div style={{ padding: '20px' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '20px' }}>
                <h3 style={{ fontWeight: 700 }}>{item ? 'Edit' : 'Daftarkan'} Member</h3>
                <button onClick={onClose} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--muted)' }}><Icon name="x" size={18} /></button>
              </div>
              {[
                { l: 'Nama Lengkap*', k: 'name', ph: 'Nama member' },
                { l: 'No. HP / WhatsApp*', k: 'phone', ph: '08xxxxxxxxxx' },
                { l: 'Alamat', k: 'address', ph: 'Alamat lengkap' },
                { l: 'Limit Kredit (Rp)', k: 'creditLimit', type: 'number', ph: '500000' },
              ].map(f => (
                <div key={f.k} style={{ marginBottom: 12 }}>
                  <div className="label">{f.l}</div>
                  <input className="input" type={f.type || 'text'} placeholder={f.ph} value={form[f.k] || ''} onChange={e => setForm(p => ({ ...p, [f.k]: e.target.value }))} />
                </div>
              ))}
              <div style={{ display: 'flex', gap: 8, marginTop: '20px', justifyContent: 'flex-end' }}>
                <button className="btn btn-ghost" onClick={onClose}>Batal</button>
                <button className="btn btn-primary" onClick={() => onSave({ ...form, creditLimit: +form.creditLimit || 500000 })}>
                  <Icon name="check" size={14} /> Simpan
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function MemberProfile({ member, onClose }) {
      const { transactions, debts } = useApp();
      const txs = transactions.filter(t => t.memberId === member.id).slice().reverse().slice(0, 10);
      const activeDebts = debts.filter(d => d.memberId === member.id && !d.paid);
      return (
        <div className="modal-overlay">
          <div className="modal modal-lg">
            <div style={{ padding: '20px' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '20px' }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                  <div style={{ width: 48, height: 48, background: 'linear-gradient(135deg,var(--primary),var(--warn))', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 800, fontSize: 20, color: '#000' }}>{member.name[0]}</div>
                  <div><h3 style={{ fontWeight: 700, fontSize: 16 }}>{member.name}</h3>
                    <div style={{ fontSize: 12, color: 'var(--muted)' }}>{member.phone} | Member sejak {fmtDate(member.joinDate)}</div>
                  </div>
                </div>
                <button onClick={onClose} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--muted)' }}><Icon name="x" size={18} /></button>
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 10, marginBottom: '16px' }}>
                {[
                  { l: 'Total Poin', v: member.points, c: 'var(--primary)' },
                  { l: 'Limit Kredit', v: fmt(member.creditLimit), c: 'var(--info)' },
                  { l: 'Hutang Aktif', v: fmt(activeDebts.reduce((s, d) => s + d.amount, 0)), c: activeDebts.length ? 'var(--danger)' : 'var(--success)' },
                ].map((s, i) => (
                  <div key={i} style={{ background: 'var(--card2)', borderRadius: '8px', padding: '12px', textAlign: 'center' }}>
                    <div style={{ fontSize: 11, color: 'var(--muted)', marginBottom: '4px' }}>{s.l}</div>
                    <div className="mono" style={{ fontSize: 18, fontWeight: 700, color: s.c }}>{s.v}</div>
                  </div>
                ))}
              </div>
              {activeDebts.length > 0 && (
                <div style={{ marginBottom: '16px' }}>
                  <div style={{ fontWeight: 700, fontSize: 13, marginBottom: '8px', color: 'var(--danger)' }}>⚠️ Hutang Aktif</div>
                  {activeDebts.map(d => (
                    <div key={d.id} style={{ display: 'flex', justifyContent: 'space-between', padding: '8px 12px', background: 'rgba(239,68,68,.05)', border: '1px solid rgba(239,68,68,.2)', borderRadius: '8px', marginBottom: '4px', fontSize: 12 }}>
                      <span>Jatuh tempo: {fmtDate(d.dueDate)}</span>
                      <span className="mono" style={{ fontWeight: 700, color: 'var(--danger)' }}>{fmt(d.amount)}</span>
                    </div>
                  ))}
                </div>
              )}
              <div style={{ fontWeight: 700, fontSize: 13, marginBottom: '8px' }}>Riwayat Transaksi Terakhir</div>
              {txs.length === 0 && <p style={{ color: 'var(--dim)', fontSize: 12 }}>Belum ada transaksi</p>}
              {txs.map(tx => (
                <div key={tx.id} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '8px 12px', background: 'var(--card2)', borderRadius: '6px', marginBottom: '4px', fontSize: 12 }}>
                  <div>
                    <span>{fmtDateTime(tx.time)}</span>
                    <span className="badge badge-info" style={{ marginLeft: 8 }}>{tx.method}</span>
                  </div>
                  <span className="mono" style={{ fontWeight: 600, color: 'var(--primary)' }}>{fmt(tx.total)}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════
    // DEBT MANAGEMENT
    // ═══════════════════════════════════════════════════
    function DebtView() {
      const { debts, setDebts, members, addToast } = useApp();
      const [filter, setFilter] = useState('unpaid');
      const [showPay, setShowPay] = useState(null);

      const filtered = filter === 'all' ? debts : filter === 'unpaid' ? debts.filter(d => !d.paid) : debts.filter(d => d.paid);
      const totalUnpaid = debts.filter(d => !d.paid).reduce((s, d) => s + d.amount, 0);
      const overdue = debts.filter(d => !d.paid && d.dueDate < today());

      const payDebt = (debt, amount, notes) => {
        setDebts(prev => prev.map(d => d.id === debt.id ? { ...d, paid: true, paidDate: today(), paidAmount: amount, paidNotes: notes } : d));
        addToast(`Hutang ${debt.memberName} lunas!`, 'var(--success)', '✅');
        setShowPay(null);
      };

      return (
        <div style={{ padding: '24px', overflowY: 'auto', height: '100%' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '20px' }}>
            <div><h1 style={{ fontSize: 22, fontWeight: 800 }}>💳 Manajemen Hutang</h1>
              <p style={{ color: 'var(--muted)', fontSize: 13 }}>Total piutang: <strong style={{ color: 'var(--danger)' }}>{fmt(totalUnpaid)}</strong></p></div>
            <button className="btn btn-ghost" onClick={() => exportToExcel(debts, 'Hutang')}><Icon name="download" size={14} /> Export</button>
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 12, marginBottom: 20 }}>
            {[
              { l: 'Total Piutang', v: fmt(totalUnpaid), c: 'var(--danger)', icon: '💳' },
              { l: 'Jatuh Tempo Hari Ini', v: overdue.length + ' hutang', c: 'var(--warn)', icon: '⚠️' },
              { l: 'Hutang Lunas (Bulan Ini)', v: debts.filter(d => d.paid && d.paidDate?.startsWith(today().slice(0, 7))).length, c: 'var(--success)', icon: '✅' },
            ].map((s, i) => (
              <div key={i} className="stat-card">
                <div style={{ fontSize: 24, marginBottom: 8 }}>{s.icon}</div>
                <div style={{ fontSize: 11, color: 'var(--muted)', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '.5px' }}>{s.l}</div>
                <div className="mono" style={{ fontSize: 20, fontWeight: 700, color: s.c, marginTop: 4 }}>{s.v}</div>
              </div>
            ))}
          </div>

          <div style={{ display: 'flex', gap: 8, marginBottom: '16px' }}>
            {[['unpaid', 'Belum Lunas'], ['paid', 'Lunas'], ['all', 'Semua']].map(([k, l]) => (
              <button key={k} onClick={() => setFilter(k)} style={{ padding: '7px 16px', borderRadius: '20px', border: '1px solid var(--border2)', background: filter === k ? 'var(--primary)' : 'var(--card2)', color: filter === k ? '#000' : 'var(--muted)', fontSize: 12, fontWeight: 600, cursor: 'pointer' }}>
                {l}
              </button>
            ))}
          </div>

          <div className="card" style={{ padding: 0, overflow: 'hidden' }}>
            <div style={{ overflowX: 'auto' }}>
              <table style={{ width: '100%', borderCollapse: 'collapse' }}>
                <thead>
                  <tr style={{ background: 'var(--card2)', borderBottom: '1px solid var(--border)' }}>
                    {['Member', 'Jumlah', 'Tgl Hutang', 'Jatuh Tempo', 'Status', 'Catatan', 'Aksi'].map(h => (
                      <th key={h} style={{ padding: '12px 16px', textAlign: 'left', fontSize: 11, fontWeight: 700, color: 'var(--muted)', letterSpacing: '.5px', textTransform: 'uppercase' }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {filtered.map((d, i) => {
                    const isOverdue = !d.paid && d.dueDate < today();
                    return (
                      <tr key={d.id} style={{ borderBottom: '1px solid var(--border)', background: isOverdue ? 'rgba(239,68,68,.04)' : 'transparent' }}>
                        <td style={{ padding: '12px 16px', fontWeight: 600 }}>{d.memberName}</td>
                        <td style={{ padding: '12px 16px' }}><span className="mono" style={{ fontWeight: 700, color: 'var(--danger)' }}>{fmt(d.amount)}</span></td>
                        <td style={{ padding: '12px 16px', color: 'var(--muted)', fontSize: 12 }}>{fmtDate(d.date)}</td>
                        <td style={{ padding: '12px 16px', fontSize: 12, color: isOverdue ? 'var(--danger)' : 'var(--muted)' }}>
                          {fmtDate(d.dueDate)} {isOverdue && '⚠️'}
                        </td>
                        <td style={{ padding: '12px 16px' }}>
                          {d.paid ? <span className="badge badge-success">Lunas {d.paidDate ? `(${fmtDate(d.paidDate)})` : ''}</span>
                            : isOverdue ? <span className="badge badge-danger">Jatuh Tempo</span>
                              : <span className="badge badge-warn">Belum Lunas</span>}
                        </td>
                        <td style={{ padding: '12px 16px', fontSize: 11, color: 'var(--muted)', maxWidth: 150, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{d.notes || d.paidNotes || '-'}</td>
                        <td style={{ padding: '12px 16px' }}>
                          {!d.paid && (
                            <button className="btn btn-success btn-sm" onClick={() => setShowPay(d)}>
                              <Icon name="check" size={12} /> Bayar
                            </button>
                          )}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
              {filtered.length === 0 && <div style={{ padding: '40px', textAlign: 'center', color: 'var(--dim)' }}>Tidak ada data hutang</div>}
            </div>
          </div>

          {showPay && (
            <div className="modal-overlay">
              <div className="modal" style={{ maxWidth: 400 }}>
                <div style={{ padding: '20px' }}>
                  <h3 style={{ fontWeight: 700, marginBottom: '16px' }}>Terima Pembayaran Hutang</h3>
                  <div style={{ background: 'var(--card2)', borderRadius: '8px', padding: '12px', marginBottom: '16px' }}>
                    <div style={{ fontSize: 12, color: 'var(--muted)' }}>Member</div>
                    <div style={{ fontWeight: 700 }}>{showPay.memberName}</div>
                    <div className="mono" style={{ fontSize: 20, fontWeight: 700, color: 'var(--danger)', marginTop: '4px' }}>{fmt(showPay.amount)}</div>
                  </div>
                  <PayDebtForm debt={showPay} onConfirm={payDebt} onCancel={() => setShowPay(null)} />
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    function PayDebtForm({ debt, onConfirm, onCancel }) {
      const [amount, setAmount] = useState(debt.amount);
      const [notes, setNotes] = useState('');
      return (
        <>
          <div style={{ marginBottom: 12 }}>
            <div className="label">Jumlah Bayar (Rp)</div>
            <input className="input mono" type="number" value={amount} onChange={e => setAmount(+e.target.value)} style={{ fontSize: 16, fontWeight: 700 }} />
          </div>
          <div style={{ marginBottom: 16 }}>
            <div className="label">Catatan</div>
            <input className="input" placeholder="Catatan pembayaran..." value={notes} onChange={e => setNotes(e.target.value)} />
          </div>
          <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end' }}>
            <button className="btn btn-ghost" onClick={onCancel}>Batal</button>
            <button className="btn btn-success" onClick={() => onConfirm(debt, amount, notes)}>
              <Icon name="check" size={14} /> Konfirmasi Lunas
            </button>
          </div>
        </>
      );
    }

    // ═══════════════════════════════════════════════════
    // REPORTS
    // ═══════════════════════════════════════════════════
    function ReportsView() {
      const { transactions, products } = useApp();
      const [period, setPeriod] = useState('today');
      const [chartType, setChartType] = useState('bar');
      const chartRef = useRef(null);
      const chartInst = useRef(null);

      const filtered = useMemo(() => {
        const now = new Date();
        return transactions.filter(tx => {
          const d = new Date(tx.time);
          if (period === 'today') return tx.date === today();
          if (period === 'week') { const w = new Date(now); w.setDate(now.getDate() - 7); return d >= w; }
          if (period === 'month') return tx.date.startsWith(now.toISOString().slice(0, 7));
          return true;
        });
      }, [transactions, period]);

      const revenue = filtered.filter(t => t.method !== 'Hutang').reduce((s, t) => s + t.total, 0);
      const cost = filtered.reduce((s, t) => s + t.items.reduce((ss, i) => ss + i.cost * i.qty, 0), 0);
      const profit = revenue - cost;
      const margin = revenue ? Math.round(profit / revenue * 100) : 0;

      const topProducts = useMemo(() => {
        const map = {};
        filtered.forEach(tx => tx.items.forEach(i => {
          if (!map[i.name]) map[i.name] = { qty: 0, revenue: 0 };
          map[i.name].qty += i.qty;
          map[i.name].revenue += i.price * i.qty;
        }));
        return Object.entries(map).sort((a, b) => b[1].qty - a[1].qty).slice(0, 8);
      }, [filtered]);

      const hourlyData = useMemo(() => {
        const hours = Array(24).fill(0);
        filtered.forEach(tx => { const h = new Date(tx.time).getHours(); hours[h] += tx.total; });
        return hours;
      }, [filtered]);

      useEffect(() => {
        if (!chartRef.current) return;
        if (chartInst.current) chartInst.current.destroy();
        chartInst.current = new Chart(chartRef.current, {
          type: chartType,
          data: {
            labels: Array.from({ length: 24 }, (_, i) => `${i}:00`),
            datasets: [{
              label: 'Pendapatan',
              data: hourlyData,
              backgroundColor: 'rgba(245,158,11,0.4)',
              borderColor: '#F59E0B',
              borderWidth: 2,
              borderRadius: 4,
              tension: .4,
              fill: chartType === 'line',
            }]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => 'Rp ' + ctx.raw.toLocaleString('id-ID') } } },
            scales: { x: { grid: { display: false }, ticks: { color: '#8B949E' } }, y: { grid: { color: 'rgba(255,255,255,.05)' }, ticks: { color: '#8B949E', callback: v => 'Rp ' + fmtNum(v) } } }
          }
        });
      }, [hourlyData, chartType]);

      const exportReport = () => {
        const data = filtered.map(tx => {
          const txCost = tx.items.reduce((s, i) => s + (i.cost || 0) * i.qty, 0);
          const txProfit = tx.method !== 'Hutang' ? (tx.profit !== undefined ? tx.profit : (tx.total - txCost)) : 0;
          return {
            ID: tx.id, Tanggal: tx.date, Waktu: fmtTime(tx.time),
            Kasir: tx.cashier, Outlet: tx.outlet || '-',
            Member: tx.memberName || '-', 'Metode Bayar': tx.method,
            'Subtotal (Rp)': tx.subtotal || tx.total,
            'Diskon (Rp)': tx.discount || 0,
            'Total (Rp)': tx.total,
            'HPP (Rp)': txCost,
            'Keuntungan (Rp)': txProfit,
            'Margin (%)': tx.margin !== undefined ? tx.margin : (tx.total > 0 ? Math.round(txProfit / tx.total * 100) : 0),
            Catatan: tx.notes || ''
          };
        });
        exportToExcel(data, 'Laporan_' + period);
      };

      return (
        <div style={{ padding: '24px', overflowY: 'auto', height: '100%' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '20px' }}>
            <div><h1 style={{ fontSize: 22, fontWeight: 800 }}>📈 Laporan Penjualan</h1></div>
            <div style={{ display: 'flex', gap: 8 }}>
              {[['today', 'Hari Ini'], ['week', '7 Hari'], ['month', 'Bulan Ini'], ['all', 'Semua']].map(([k, l]) => (
                <button key={k} onClick={() => setPeriod(k)} style={{ padding: '7px 14px', borderRadius: '20px', border: '1px solid var(--border2)', background: period === k ? 'var(--primary)' : 'var(--card2)', color: period === k ? '#000' : 'var(--muted)', fontSize: 12, fontWeight: 600, cursor: 'pointer' }}>
                  {l}
                </button>
              ))}
              <button className="btn btn-ghost" onClick={exportReport}><Icon name="download" size={14} /> Export</button>
            </div>
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 12, marginBottom: 20 }}>
            {[
              { l: 'Total Penjualan', v: fmt(revenue), c: 'var(--success)', icon: '💵' },
              { l: 'Total HPP', v: fmt(cost), c: 'var(--warn)', icon: '📦' },
              { l: 'Keuntungan Bersih', v: fmt(profit), c: 'var(--primary)', icon: '📈' },
              { l: 'Margin', v: `${margin}%`, c: margin > 20 ? 'var(--success)' : 'var(--warn)', icon: '📊' },
            ].map((s, i) => (
              <div key={i} className="stat-card">
                <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                  <div>
                    <div style={{ fontSize: 11, color: 'var(--muted)', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '.5px', marginBottom: 8 }}>{s.l}</div>
                    <div className="mono" style={{ fontSize: 20, fontWeight: 700, color: s.c }}>{s.v}</div>
                    <div style={{ fontSize: 11, color: 'var(--dim)', marginTop: 4 }}>{filtered.length} transaksi</div>
                  </div>
                  <div style={{ fontSize: 28 }}>{s.icon}</div>
                </div>
              </div>
            ))}
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr', gap: 16, marginBottom: 16 }}>
            <div className="card">
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '12px' }}>
                <div style={{ fontWeight: 700, fontSize: 14 }}>Pendapatan per Jam</div>
                <div style={{ display: 'flex', gap: 6 }}>
                  {['bar', 'line'].map(t => (
                    <button key={t} onClick={() => setChartType(t)} style={{ padding: '4px 10px', borderRadius: '6px', border: '1px solid var(--border2)', background: chartType === t ? 'var(--primary)' : 'var(--card2)', color: chartType === t ? '#000' : 'var(--muted)', fontSize: 11, fontWeight: 600, cursor: 'pointer' }}>
                      {t === 'bar' ? 'Bar' : 'Line'}
                    </button>
                  ))}
                </div>
              </div>
              <div style={{ height: 200 }}><canvas ref={chartRef} /></div>
            </div>
            <div className="card">
              <div style={{ fontWeight: 700, fontSize: 14, marginBottom: '12px' }}>Metode Pembayaran</div>
              {PAY_METHODS.map(m => {
                const count = filtered.filter(t => t.method === m).length;
                const pct = filtered.length ? Math.round(count / filtered.length * 100) : 0;
                if (count === 0) return null;
                return (
                  <div key={m} style={{ marginBottom: '8px' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, marginBottom: '3px' }}>
                      <span>{m}</span><span className="mono">{count}x ({pct}%)</span>
                    </div>
                    <div style={{ background: 'var(--card2)', borderRadius: '3px', overflow: 'hidden', height: 6 }}>
                      <div style={{ width: `${pct}%`, height: '100%', background: 'var(--primary)', borderRadius: '3px', transition: 'width .5s' }} />
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          <div className="card">
            <div style={{ fontWeight: 700, fontSize: 14, marginBottom: '12px' }}>Produk Terlaris</div>
            <table style={{ width: '100%', borderCollapse: 'collapse' }}>
              <thead>
                <tr style={{ borderBottom: '1px solid var(--border)' }}>
                  {['#', 'Produk', 'Qty', 'Pendapatan', '% Kontribusi'].map(h => (
                    <th key={h} style={{ padding: '8px 12px', textAlign: 'left', fontSize: 11, fontWeight: 700, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '.5px' }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {topProducts.map(([name, { qty, revenue: rev }], i) => (
                  <tr key={name} style={{ borderBottom: '1px solid var(--border)' }}>
                    <td style={{ padding: '10px 12px', fontWeight: 700, color: 'var(--primary)', width: 32 }}>{i + 1}</td>
                    <td style={{ padding: '10px 12px', fontWeight: 600 }}>{name}</td>
                    <td style={{ padding: '10px 12px' }}><span className="mono">{qty} pcs</span></td>
                    <td style={{ padding: '10px 12px' }}><span className="mono" style={{ color: 'var(--success)' }}>{fmt(rev)}</span></td>
                    <td style={{ padding: '10px 12px' }}>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                        <div style={{ flex: 1, background: 'var(--card2)', borderRadius: '3px', overflow: 'hidden', height: 6 }}>
                          <div style={{ width: `${revenue ? Math.round(rev / revenue * 100) : 0}%`, height: '100%', background: 'var(--success)', borderRadius: '3px' }} />
                        </div>
                        <span className="mono" style={{ fontSize: 11, color: 'var(--muted)', minWidth: 36 }}>{revenue ? Math.round(rev / revenue * 100) : 0}%</span>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
            {topProducts.length === 0 && <div style={{ padding: '20px', textAlign: 'center', color: 'var(--dim)' }}>Tidak ada data penjualan</div>}
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════
    // FINANCE
    // ═══════════════════════════════════════════════════
    function FinanceView() {
      const { transactions, dailyProfits, setDailyProfits, user, addToast } = useApp();
      const [showWithdraw, setShowWithdraw] = useState(false);

      const todayTx = transactions.filter(t => t.date === today() && t.method !== 'Hutang');
      const todayRevenue = todayTx.reduce((s, t) => s + t.total, 0);
      const todayCost = todayTx.reduce((s, t) => s + t.items.reduce((ss, i) => ss + (i.cost || 0) * i.qty, 0), 0);
      const todayProfit = todayRevenue - todayCost;
      const todayDP = dailyProfits.find(d => d.date === today());
      const todayWithdrawn = todayDP ? todayDP.withdrawn : 0;
      const available = Math.max(0, todayProfit - todayWithdrawn);

      const handleWithdraw = (amount, notes) => {
        if (amount > available) return addToast('Jumlah melebihi keuntungan tersedia!', 'var(--danger)', '⚠️');
        const entry = { id: uid(), date: today(), amount, notes, by: user.name, time: new Date().toISOString() };
        setDailyProfits(prev => {
          const idx = prev.findIndex(d => d.date === today());
          if (idx >= 0) {
            const upd = [...prev];
            upd[idx] = { ...upd[idx], withdrawn: (upd[idx].withdrawn || 0) + amount, withdrawals: [...(upd[idx].withdrawals || []), entry] };
            return upd;
          }
          return [...prev, { date: today(), revenue: todayRevenue, cost: todayCost, profit: todayProfit, withdrawn: amount, withdrawals: [entry] }];
        });
        syncToGoogleSheets('WITHDRAW_PROFIT', {
          id: entry.id,
          date: today(),
          time: entry.time,
          amount,
          notes,
          by: user.name,
          todayRevenue,
          todayCost,
          todayProfit,
        });
        addToast(`Penarikan ${fmt(amount)} berhasil!`, 'var(--success)', '💰', 'Ambil Keuntungan');
        setShowWithdraw(false);
      };

      const last30 = useMemo(() => {
        const days = [];
        for (let i = 29; i >= 0; i--) {
          const d = new Date(); d.setDate(d.getDate() - i);
          const ds = d.toISOString().split('T')[0];
          const dayTx = transactions.filter(t => t.date === ds && t.method !== 'Hutang');
          const rev = dayTx.reduce((s, t) => s + t.total, 0);
          const cst = dayTx.reduce((s, t) => s + t.items.reduce((ss, i) => ss + (i.cost || 0) * i.qty, 0), 0);
          const dp = dailyProfits.find(p => p.date === ds);
          days.push({ date: ds, revenue: rev, cost: cst, profit: rev - cst, withdrawn: dp?.withdrawn || 0 });
        }
        return days;
      }, [transactions, dailyProfits]);

      return (
        <div style={{ padding: '24px', overflowY: 'auto', height: '100%' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '20px' }}>
            <div><h1 style={{ fontSize: 22, fontWeight: 800 }}>💰 Manajemen Keuangan</h1>
              <p style={{ color: 'var(--muted)', fontSize: 13 }}>Perhitungan laba & penarikan keuntungan</p></div>
            <button className="btn btn-ghost" onClick={() => {
              const allWithdrawals = dailyProfits.filter(d => d.withdrawals?.length > 0).flatMap(d =>
                (d.withdrawals || []).map(w => ({
                  ID: w.id, Tanggal: w.date || d.date, Waktu: fmtDateTime(w.time),
                  'Jumlah Ditarik (Rp)': w.amount, 'Omzet Hari Itu (Rp)': d.revenue || 0,
                  'HPP Hari Itu (Rp)': d.cost || 0, 'Laba Hari Itu (Rp)': d.profit || 0,
                  Catatan: w.notes || '-', Oleh: w.by
                }))
              );
              exportToExcel(allWithdrawals, 'Riwayat_Penarikan');
            }}>
              <Icon name="download" size={14} /> Export Riwayat
            </button>
          </div>

          <div style={{ background: 'linear-gradient(135deg,rgba(245,158,11,.15) 0%,rgba(249,115,22,.1) 100%)', border: '1px solid rgba(245,158,11,.3)', borderRadius: '16px', padding: '24px', marginBottom: '20px' }}>
            <div style={{ fontSize: 12, color: 'var(--primary)', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.5px', marginBottom: '16px' }}>Keuntungan Hari Ini — {fmtDate(today())}</div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 16 }}>
              {[
                { l: 'Omzet', v: fmt(todayRevenue), c: 'var(--text)' },
                { l: 'HPP', v: fmt(todayCost), c: 'var(--warn)' },
                { l: 'Laba Kotor', v: fmt(todayProfit), c: 'var(--success)' },
                { l: 'Sudah Diambil', v: fmt(todayWithdrawn), c: 'var(--primary)' },
              ].map((s, i) => (
                <div key={i}>
                  <div style={{ fontSize: 11, color: 'rgba(255,255,255,.5)', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '.5px', marginBottom: '4px' }}>{s.l}</div>
                  <div className="mono" style={{ fontSize: 22, fontWeight: 700, color: s.c }}>{s.v}</div>
                </div>
              ))}
            </div>
            <hr style={{ border: 'none', borderTop: '1px solid rgba(255,255,255,.1)', margin: '16px 0' }} />
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <div>
                <div style={{ fontSize: 12, color: 'rgba(255,255,255,.5)', marginBottom: '4px' }}>Keuntungan Tersedia</div>
                <div className="mono" style={{ fontSize: 32, fontWeight: 800, color: 'var(--primary)' }}>{fmt(available)}</div>
              </div>
              {(user.role === 'admin' || user.role === 'supervisor') && available > 0 && (
                <button className="btn btn-primary btn-lg" onClick={() => setShowWithdraw(true)} style={{ fontSize: 15, padding: '14px 28px' }}>
                  💰 Ambil Keuntungan
                </button>
              )}
            </div>
          </div>

          {showWithdraw && (
            <div className="modal-overlay">
              <div className="modal" style={{ maxWidth: 400 }}>
                <div style={{ padding: '20px' }}>
                  <h3 style={{ fontWeight: 700, marginBottom: '16px' }}>💰 Ambil Keuntungan</h3>
                  <div style={{ background: 'rgba(245,158,11,.1)', border: '1px solid rgba(245,158,11,.2)', borderRadius: '8px', padding: '12px', marginBottom: '16px', textAlign: 'center' }}>
                    <div style={{ fontSize: 11, color: 'var(--muted)' }}>Tersedia</div>
                    <div className="mono" style={{ fontSize: 28, fontWeight: 800, color: 'var(--primary)' }}>{fmt(available)}</div>
                  </div>
                  <WithdrawForm available={available} onConfirm={handleWithdraw} onCancel={() => setShowWithdraw(false)} />
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    function WithdrawForm({ available, onConfirm, onCancel }) {
      const [amount, setAmount] = useState(available);
      const [notes, setNotes] = useState('');
      const [pin, setPin] = useState('');
      return (
        <>
          <div style={{ marginBottom: 12 }}>
            <div className="label">Jumlah Ambil (Rp)</div>
            <input className="input mono" type="number" value={amount} onChange={e => setAmount(+e.target.value)} style={{ fontSize: 18, fontWeight: 700 }} />
          </div>
          <div style={{ marginBottom: 12 }}>
            <div className="label">Catatan</div>
            <input className="input" placeholder="Catatan penarikan..." value={notes} onChange={e => setNotes(e.target.value)} />
          </div>
          <div style={{ marginBottom: 16 }}>
            <div className="label">PIN Konfirmasi Admin</div>
            <input className="input" type="password" placeholder="Masukkan PIN admin" value={pin} onChange={e => setPin(e.target.value)} />
          </div>
          <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end' }}>
            <button className="btn btn-ghost" onClick={onCancel}>Batal</button>
            <button className="btn btn-primary" onClick={() => {
              const users = LS.get('users', USERS);
              const admin = users.find(u => u.role === 'admin' && (verifyPin(pin, u.pinHash) || u.pin === pin));
              if (!admin) return alert('PIN admin salah!');
              onConfirm(amount, notes);
            }}>
              <Icon name="check" size={14} /> Konfirmasi Penarikan
            </button>
          </div>
        </>
      );
    }

    // ═══════════════════════════════════════════════════
    // SETTINGS
    // ═══════════════════════════════════════════════════
    function SettingsView() {
      const { users, setUsers, addToast } = useApp();
      const [showUserForm, setShowUserForm] = useState(false);
      const [editUser, setEditUser] = useState(null);
      const [fbConfig, setFbConfig] = useState(FIREBASE_CONFIG);
      const [tab, setTab] = useState('users');

      return (
        <div style={{ padding: '24px', overflowY: 'auto', height: '100%' }}>
          <h1 style={{ fontSize: 22, fontWeight: 800, marginBottom: '20px' }}>⚙️ Pengaturan</h1>
          <div style={{ display: 'flex', gap: 8, marginBottom: '20px' }}>
            {[['users', 'Pengguna'], ['firebase', 'Firebase'], ['outlet', 'Outlet'], ['backup', 'Backup']].map(([k, l]) => (
              <button key={k} onClick={() => setTab(k)} style={{ padding: '8px 16px', borderRadius: '8px', border: '1px solid var(--border2)', background: tab === k ? 'var(--primary)' : 'var(--card2)', color: tab === k ? '#000' : 'var(--muted)', fontSize: 13, fontWeight: 600, cursor: 'pointer' }}>
                {l}
              </button>
            ))}
          </div>

          {tab === 'users' && (
            <div>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '16px' }}>
                <h2 style={{ fontSize: 16, fontWeight: 700 }}>Manajemen Pengguna</h2>
                <button className="btn btn-primary btn-sm" onClick={() => { setEditUser(null); setShowUserForm(true); }}>
                  <Icon name="plus" size={12} /> Tambah User
                </button>
              </div>
              <div style={{ display: 'grid', gap: 10 }}>
                {users.map(u => (
                  <div key={u.id} className="card" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '14px 18px' }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                      <div style={{ width: 36, height: 36, background: 'var(--primary)', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 800, color: '#000' }}>{u.name[0]}</div>
                      <div>
                        <div style={{ fontWeight: 600 }}>{u.name}</div>
                        <div style={{ fontSize: 12, color: 'var(--muted)' }}>{u.email || '-'} | Outlet: {u.outlet}</div>
                      </div>
                    </div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                      <span className={`badge badge-${u.role === 'admin' ? 'danger' : u.role === 'supervisor' ? 'warn' : 'info'}`}>{u.role}</span>
                      <button className="btn btn-ghost btn-sm" onClick={() => { setEditUser(u); setShowUserForm(true); }}><Icon name="edit" size={12} /></button>
                      {u.role !== 'admin' && <button className="btn btn-danger btn-sm" onClick={() => { if (confirm('Hapus user "' + u.name + '"? User tidak bisa dikembalikan.')) { deleteFromFirebase('users', u.id); setUsers(prev => prev.filter(x => x.id !== u.id)); addToast('User ' + u.name + ' dihapus permanen', 'var(--muted)', '🗑️'); } }}><Icon name="trash" size={12} /></button>}
                    </div>
                  </div>
                ))}
              </div>
              {showUserForm && <UserForm item={editUser} onClose={() => setShowUserForm(false)} onSave={data => {
                if (editUser) setUsers(prev => prev.map(u => u.id === editUser.id ? { ...u, ...data } : u));
                else setUsers(prev => [...prev, { ...data, id: uid() }]);
                setShowUserForm(false);
                addToast('User disimpan', 'var(--success)', '✅');
              }} />}
            </div>
          )}

          {tab === 'firebase' && (
            <div className="card">
              <h2 style={{ fontSize: 16, fontWeight: 700, marginBottom: '16px' }}>🔥 Konfigurasi Firebase</h2>
              <div style={{ background: useFirebase ? 'rgba(16,185,129,.1)' : 'rgba(239,68,68,.1)', border: `1px solid ${useFirebase ? 'rgba(16,185,129,.3)' : 'rgba(239,68,68,.3)'}`, borderRadius: '8px', padding: '12px', marginBottom: '16px', fontSize: 12 }}>
                {useFirebase ? '✅ Firebase terhubung dan aktif' : '⚠️ Firebase belum dikonfigurasi. Isi config di config.js lalu reload halaman.'}
              </div>
              <p style={{ fontSize: 11, color: 'var(--dim)', marginTop: '8px' }}>Konfigurasi Firebase ada di file config.js. Edit file tersebut untuk mengubah pengaturan.</p>
            </div>
          )}

          {tab === 'outlet' && (
            <div className="card" style={{ textAlign: 'center', padding: '60px 20px' }}>
              <div style={{ fontSize: 56, marginBottom: '16px' }}>🏪</div>
              <h2 style={{ fontSize: 20, fontWeight: 800, marginBottom: '8px' }}>Manajemen Outlet</h2>
              <p style={{ color: 'var(--muted)', fontSize: 14, marginBottom: '16px' }}>Fitur ini sedang dalam pengembangan.</p>
              <span className="badge badge-warn" style={{ fontSize: 13, padding: '6px 16px' }}>🚧 Coming Soon</span>
            </div>
          )}

          {tab === 'backup' && (
            <div style={{ display: 'grid', gap: 12 }}>
              <div className="card">
                <h3 style={{ fontWeight: 700, marginBottom: '12px' }}>📤 Export & Backup Data</h3>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
                  {[
                    { l: 'Export Semua Transaksi', k: 'transactions', icon: '🧾' },
                    { l: 'Export Data Produk', k: 'products', icon: '📦' },
                    { l: 'Export Data Member', k: 'members', icon: '👥' },
                    { l: 'Export Data Hutang', k: 'debts', icon: '💳' },
                  ].map(item => (
                    <button key={item.k} className="btn btn-ghost" style={{ justifyContent: 'flex-start', gap: 10 }} onClick={() => {
                      const data = LS.get(item.k, []);
                      exportToExcel(data, item.l);
                    }}>
                      <span style={{ fontSize: 20 }}>{item.icon}</span> {item.l}
                    </button>
                  ))}
                </div>
              </div>
              <div className="card">
                <h3 style={{ fontWeight: 700, marginBottom: '12px' }}>🗑️ Reset Data</h3>
                <p style={{ color: 'var(--muted)', fontSize: 13, marginBottom: '12px' }}>Hapus semua data dari penyimpanan lokal. Tidak dapat dibatalkan!</p>
                <button className="btn btn-danger" onClick={() => {
                  if (confirm('YAKIN? Semua data transaksi akan dihapus permanen!')) {
                    ['transactions', 'products', 'members', 'debts', 'dailyProfits'].forEach(k => LS.set(k, []));
                    window.location.reload();
                  }
                }}>⚠️ Reset Semua Data</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    function UserForm({ item, onClose, onSave }) {
      const [form, setForm] = useState({ name: '', email: '', role: 'kasir', pin: '', outlet: 'Pusat', ...item });
      return (
        <div className="modal-overlay">
          <div className="modal" style={{ maxWidth: 440 }}>
            <div style={{ padding: '20px' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '20px' }}>
                <h3 style={{ fontWeight: 700 }}>{item ? 'Edit' : 'Tambah'} Pengguna</h3>
                <button onClick={onClose} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--muted)' }}><Icon name="x" size={18} /></button>
              </div>
              {[
                { l: 'Nama*', k: 'name', ph: 'Nama lengkap' },
                { l: 'Email', k: 'email', ph: 'email@toko.com' },
                { l: 'PIN (4-6 digit)*', k: 'pin', ph: '****', type: 'password' },
                { l: 'Outlet', k: 'outlet', ph: 'Nama outlet' },
              ].map(f => (
                <div key={f.k} style={{ marginBottom: 12 }}>
                  <div className="label">{f.l}</div>
                  <input className="input" type={f.type || 'text'} placeholder={f.ph} value={form[f.k] || ''} onChange={e => setForm(p => ({ ...p, [f.k]: e.target.value }))} />
                </div>
              ))}
              <div style={{ marginBottom: 16 }}>
                <div className="label">Role</div>
                <select className="input select" value={form.role} onChange={e => setForm(p => ({ ...p, role: e.target.value }))}>
                  {['kasir', 'supervisor', 'admin'].map(r => <option key={r} value={r}>{r}</option>)}
                </select>
              </div>
              <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end' }}>
                <button className="btn btn-ghost" onClick={onClose}>Batal</button>
                <button className="btn btn-primary" onClick={() => {
                  const dataToSave = { ...form };
                  if (dataToSave.pin && dataToSave.pin.length >= 4) {
                    dataToSave.pinHash = hashPin(dataToSave.pin);
                    delete dataToSave.pin;
                  }

                  // SINKRONISASI KE FIREBASE UNTUK USERS (termasuk pinHash agar bisa login di perangkat lain)
                  if (useFirebase && db) {
                    const firebaseUserData = {
                      id: item?.id || dataToSave.id || uid(),
                      name: dataToSave.name || form.name,
                      email: dataToSave.email || form.email || '',
                      role: dataToSave.role || form.role,
                      outlet: dataToSave.outlet || form.outlet || 'Pusat',
                      pinHash: dataToSave.pinHash || item?.pinHash || '',
                    };
                    db.collection('users').doc(firebaseUserData.id).set(firebaseUserData, { merge: true })
                      .then(() => console.log('✅ User tersimpan ke Firebase:', firebaseUserData.name))
                      .catch(e => console.error('❌ Gagal simpan user ke Firebase:', e));
                  }

                  onSave(dataToSave);
                }}>
                  <Icon name="check" size={14} /> Simpan
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════
    // EXPORT UTILITY
    // ═══════════════════════════════════════════════════
    function exportToExcel(data, name) {
      if (typeof XLSX === 'undefined') return alert('XLSX library tidak tersedia');
      const ws = XLSX.utils.json_to_sheet(data);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Data');
      XLSX.writeFile(wb, `KasirPro_${name}_${today()}.xlsx`);
    }

    // ═══════════════════════════════════════════════════
    // GOOGLE SHEETS SYNC (with token & offline queue)
    // ═══════════════════════════════════════════════════
    // [BUG FIX #7] Improved error detection for Google Sheets sync
    // no-cors selalu resolve, jadi kita gunakan timeout + error pada network failure
    function syncToGoogleSheets(action, payload) {
      return new Promise((resolve, reject) => {
        if (typeof GOOGLE_SHEET_URL === 'undefined' || !GOOGLE_SHEET_URL.startsWith('http')) {
          resolve();
          return;
        }

        const securePayload = {
          action,
          payload,
          token: APP_SECRET,
          timestamp: Date.now(),
          version: '3.1'
        };

        try {
          // Gunakan timeout 10 detik untuk mendeteksi masalah jaringan
          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), 10000);

          fetch(GOOGLE_SHEET_URL, {
            method: 'POST',
            mode: 'no-cors',
            signal: controller.signal,
            body: JSON.stringify(securePayload)
          })
            .then((response) => {
              clearTimeout(timeoutId);
              // no-cors response type selalu 'opaque', tapi jika sampai sini berarti
              // request terkirim. Resolve berhasil.
              resolve(response);
            })
            .catch((error) => {
              clearTimeout(timeoutId);
              console.error('Google Sheets Sync Error:', error);
              // Jika offline, masukkan ke antrean
              if (!navigator.onLine || error.name === 'AbortError') {
                OfflineQueue.add(action, payload);
                console.warn('Request diantrekan untuk sinkronisasi offline');
              }
              reject(error);
            });
        } catch (e) {
          if (!navigator.onLine) {
            OfflineQueue.add(action, payload);
          }
          reject(e);
        }
      });
    }

    // ═══════════════════════════════════════════════════
    // FIREBASE SYNC HELPERS (UPDATED - HANDLE DELETIONS)
    // ═══════════════════════════════════════════════════

    // Hapus satu dokumen dari Firebase
    async function deleteFromFirebase(collection, docId) {
      if (!db) return;
      try {
        await db.collection(collection).doc(docId).delete();
        console.log(`✅ Dokumen ${docId} dihapus dari Firebase (${collection})`);
      } catch (e) {
        console.error(`Gagal hapus ${docId} dari Firebase:`, e);
      }
    }

    // Sinkronisasi data ke Firebase + hapus dokumen yang sudah tidak ada di lokal
    async function syncToFirebase(collection, data) {
      if (!db) return;
      try {
        const batch = db.batch();

        // Ambil daftar ID yang ada di lokal
        var localIds = new Set();
        if (Array.isArray(data)) {
          data.forEach(item => localIds.add(item.id));
        } else if (typeof data === 'object' && data.id) {
          localIds.add(data.id);
        }

        // Jika data adalah array — update semua + hapus yang tidak ada
        if (Array.isArray(data)) {
          data.forEach(item => {
            if (collection === 'users') {
              const safeUser = { ...item };
              delete safeUser.pin;
              const ref = db.collection(collection).doc(item.id);
              batch.set(ref, safeUser, { merge: true });
            } else {
              const ref = db.collection(collection).doc(item.id);
              batch.set(ref, item, { merge: true });
            }
          });

          // [BUG FIX] Hapus dokumen di Firebase yang sudah dihapus dari lokal
          const snap = await db.collection(collection).get();
          snap.forEach(doc => {
            if (!localIds.has(doc.id)) {
              batch.delete(doc.ref);
              console.log(`🗑️ Dokumen ${doc.id} dihapus dari Firebase (${collection})`);
            }
          });
        }
        // Jika data adalah object tunggal
        else if (typeof data === 'object' && data.id) {
          if (collection === 'users') {
            const safeUser = { ...data };
            delete safeUser.pin;
            const ref = db.collection(collection).doc(data.id);
            batch.set(ref, safeUser, { merge: true });
          } else {
            const ref = db.collection(collection).doc(data.id);
            batch.set(ref, data, { merge: true });
          }
        }

        await batch.commit();
        console.log(`✅ Sinkronisasi ${collection} ke Firebase berhasil`);
      } catch (e) {
        console.error('Firebase sync error:', e);
      }
    }

    // ═══════════════════════════════════════════════════
    // MAIN APP
    // ═══════════════════════════════════════════════════
    function App() {
      const [user, setUser] = useState(null);
      const [view, setView] = useState('dashboard');
      const [online, setOnline] = useState(navigator.onLine);
      const [toasts, setToasts] = useState([]);

      const [products, setProductsState] = useState(() => LS.get('products', []));
      const [transactions, setTransactionsState] = useState(() => LS.get('transactions', []));
      const [members, setMembersState] = useState(() => LS.get('members', []));
      const [debts, setDebtsState] = useState(() => LS.get('debts', []));
      const [users, setUsersState] = useState(() => LS.get('users', USERS));
      const [dailyProfits, setDailyProfitsState] = useState(() => LS.get('dailyProfits', []));

      const persist = (key, setter, syncColl) => (val) => {
        const data = typeof val === 'function' ? val : () => val;
        setter(prev => {
          const next = data(prev);
          LS.set(key, next);
          if (useFirebase && syncColl) syncToFirebase(syncColl, next);
          return next;
        });
      };

      // AKTIFKAN SINCRONISASI FIREBASE UNTUK SEMUA DATA TERMASUK USERS
      const setProducts = persist('products', setProductsState, 'products');
      const setTransactions = persist('transactions', setTransactionsState, 'transactions');
      const setMembers = persist('members', setMembersState, 'members');
      const setDebts = persist('debts', setDebtsState, 'debts');
      const setUsers = persist('users', setUsersState, 'users'); // 🔥 USERS SEKARANG DISINKRONKAN KE FIREBASE
      const setDailyProfits = persist('dailyProfits', setDailyProfitsState, 'dailyProfits');

      const addTransaction = async (tx) => {
        // Validasi stok
        const currentProducts = LS.get('products', []);
        let stockValid = true;
        const stockErrors = [];

        for (const item of tx.items) {
          const product = currentProducts.find(p => p.id === item.id);
          if (!product) {
            stockValid = false;
            stockErrors.push(`Produk "${item.name}" tidak ditemukan`);
          } else if (product.stock < item.qty) {
            stockValid = false;
            stockErrors.push(`Stok "${item.name}" tidak cukup (tersedia: ${product.stock}, diminta: ${item.qty})`);
          }
        }

        if (!stockValid) {
          addToast(stockErrors.join('. '), 'var(--danger)', '❌', 'Gagal Validasi Stok');
          return false;
        }

        setTransactions(prev => {
          const next = [tx, ...prev];
          if (useFirebase) db?.collection('transactions').doc(tx.id).set(tx);
          syncToGoogleSheets('ADD_TRANSACTION', tx).catch(() => {
            console.log('Transaksi masuk antrean offline');
          });
          return next;
        });

        return true;
      };

      // [BUG FIX #4] addDebt double-write: LS.set sudah dipanggil oleh persist() wrapper
      const addDebt = (debt) => {
        setDebts(prev => [debt, ...prev]);
      };

      const addToast = (msg, color = 'var(--success)', icon = 'ℹ️', title = '') => {
        const id = uid();
        setToasts(t => [...t, { id, msg, color, icon, title }]);
        setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3500);
      };

      // Online/Offline listener
      useEffect(() => {
        const on = () => {
          setOnline(true);
          // Proses antrean offline saat online
          setTimeout(async () => {
            const queueCount = OfflineQueue.getCount();
            if (queueCount > 0) {
              addToast(`Memproses ${queueCount} data offline...`, 'var(--info)', '🔄', 'Sinkronisasi');
            }
            await OfflineQueue.process();
            const remaining = OfflineQueue.getCount();
            if (queueCount > 0 && remaining === 0) {
              addToast('Semua data offline berhasil disinkronkan!', 'var(--success)', '✅', 'Sinkronisasi');
            } else if (remaining > 0) {
              addToast(`${remaining} data gagal disinkronkan`, 'var(--warn)', '⚠️', 'Sinkronisasi');
            }
          }, 2000);
        };
        const off = () => setOnline(false);
        window.addEventListener('online', on);
        window.addEventListener('offline', off);
        return () => { window.removeEventListener('online', on); window.removeEventListener('offline', off); };
      }, []);

      // Firebase realtime sync (UPDATED - SUPPORT USERS)
      useEffect(() => {
        if (!db || !user) return;
        const unsubs = [];

        ['products', 'members', 'transactions', 'debts', 'users', 'dailyProfits'].forEach(coll => {
          const unsub = db.collection(coll).onSnapshot(snap => {
            if (!snap.empty) {
              const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));

              // Untuk users, gabungkan dengan PIN hash lokal
              if (coll === 'users') {
                const localUsers = LS.get('users', []);
                const mergedUsers = data.map(remoteUser => {
                  const localUser = localUsers.find(u => u.id === remoteUser.id);
                  return {
                    ...remoteUser,
                    pinHash: localUser?.pinHash || remoteUser.pinHash,
                  };
                });
                LS.set(coll, mergedUsers);
                setUsersState(mergedUsers);
              } else {
                LS.set(coll, data);
                if (coll === 'products') setProductsState(data);
                if (coll === 'members') setMembersState(data);
                if (coll === 'transactions') setTransactionsState(data);
                if (coll === 'debts') setDebtsState(data);
                if (coll === 'dailyProfits') setDailyProfitsState(data);
              }
            }
          });
          unsubs.push(unsub);
        });

        return () => unsubs.forEach(u => u());
      }, [user]);

      if (!user) return <LoginScreen onLogin={u => { setUser(u); addToast(`Selamat datang, ${u.name}!`, 'var(--success)', '👋'); }} />;

      const ctx = {
        user, view, setView, online, products, setProducts, transactions, setTransactions,
        addTransaction, members, setMembers, debts, setDebts, addDebt, users, setUsers,
        dailyProfits, setDailyProfits, addToast, toasts
      };

      return (
        <AppCtx.Provider value={ctx}>
          <div style={{ display: 'flex', height: '100vh', overflow: 'hidden' }}>
            <div className="sidebar-desktop" style={{ display: 'flex' }}>
              <Sidebar view={view} setView={setView} user={user} online={online} onLogout={() => { setUser(null); addToast('Berhasil keluar', 'var(--muted)', '👋'); }} />
            </div>
            <div style={{ flex: 1, overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
              <div className="main-content" style={{ flex: 1, overflow: 'hidden' }}>
                {view === 'dashboard' && <Dashboard />}
                {view === 'pos' && (user.role === 'admin' || user.role === 'kasir' ? <POSTerminal /> : <div style={{ padding: '40px', textAlign: 'center', color: 'var(--muted)' }}>Akses ditolak</div>)}
                {view === 'produk' && (user.role === 'admin' || user.role === 'supervisor' ? <ProductsView /> : <div style={{ padding: '40px', textAlign: 'center', color: 'var(--muted)' }}>Akses ditolak</div>)}
                {view === 'member' && (user.role === 'admin' || user.role === 'kasir' ? <MemberView /> : <div style={{ padding: '40px', textAlign: 'center', color: 'var(--muted)' }}>Akses ditolak</div>)}
                {view === 'hutang' && (user.role === 'admin' || user.role === 'kasir' ? <DebtView /> : <div style={{ padding: '40px', textAlign: 'center', color: 'var(--muted)' }}>Akses ditolak</div>)}
                {view === 'laporan' && (user.role === 'admin' ? <ReportsView /> : <div style={{ padding: '40px', textAlign: 'center', color: 'var(--muted)' }}>Akses ditolak</div>)}
                {view === 'keuangan' && (user.role === 'admin' ? <FinanceView /> : <div style={{ padding: '40px', textAlign: 'center', color: 'var(--muted)' }}>Akses ditolak</div>)}
                {view === 'pengaturan' && (user.role === 'admin' ? <SettingsView /> : <div style={{ padding: '40px', textAlign: 'center', color: 'var(--muted)' }}>Akses ditolak</div>)}
              </div>
            </div>
          </div>
          <MobileNav view={view} setView={setView} user={user} />
          <Toast toasts={toasts} />
        </AppCtx.Provider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
